name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for CI checks to complete
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.pull_request?.number || context.payload.number;
            const ref = context.payload.pull_request?.head?.ref;
            
            console.log(`Checking PR #${pull_number} - ${ref}`);
            
            // Wait for checks to complete (max 20 minutes)
            for (let i = 0; i < 40; i++) {
              const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref
              });
              
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: ref
              });
              
              const allSuccess = (statuses.length === 0 || statuses.every(s => s.state === 'success')) &&
                                (checks.check_runs?.every(c => c.conclusion === 'success' || c.conclusion === 'skipped') ?? true);
              
              if (allSuccess && statuses.length > 0) {
                console.log('All CI checks passed!');
                return true;
              }
              
              console.log(`Waiting for CI... (${i + 1}/40)`);
              await new Promise(r => setTimeout(r, 30000));
            }
            
            throw new Error('Timeout waiting for CI checks');

      - name: Merge PR
        run: |
          gh pr merge --admin --merge "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: failure()
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "CI checks did not complete successfully or timed out. Please check the status manually."