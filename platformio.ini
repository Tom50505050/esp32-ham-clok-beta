[platformio]
src_dir = src
include_dir = .
data_dir = littlefs_data

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.partitions = partitions.csv

; Schemat partycji 2MB APP / 2MB SPIFFS (No OTA)
board_build.filesystem = littlefs

; Biblioteki z rejestru PlatformIO
lib_deps =
    bblanchon/ArduinoJson @ ^7.4.3
    bodmer/TFT_eSPI @ ^2.5.43
    paulstoffregen/Time @ ^1.6.1
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    knolleary/PubSubClient @ ^2.8

; Dodatkowe ścieżki do bibliotek
lib_extra_dirs =
    C:/Users/tomas/Dokumenty/libraries

; Flagi kompilacji
build_flags = 
    -Os
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DUSE_LITTLEFS=1
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER=1
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL_PIN=32
    -DTFT_WIDTH=480
    -DTFT_HEIGHT=320
    -DSPI_FREQUENCY=20000000
    -DTFT_ESPI_TOUCH_DISABLED=0
    -DTOUCH_CS=21
    -DTOUCH_IRQ=22
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DSMOOTH_FONT=1

; Ustawienia upload
upload_port = COM7
upload_resetmethod = auto

; Monitoring
monitor_filters = esp32_exception_decoder

; Automatyczne kopiowanie firmware.bin po kompilacji
extra_scripts = copy_bin.py