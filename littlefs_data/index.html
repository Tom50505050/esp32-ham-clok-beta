<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0f1a;--glass:rgba(20,35,55,0.7);--border:rgba(0,212,255,0.25);--cyan:#00d4ff;--text:#e8f4f8;--muted:#6a8090}
        body{font-family:system-ui,sans-serif;background:var(--bg);background-image:radial-gradient(ellipse at 20% 80%,rgba(0,212,255,0.06) 0%,transparent 50%);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        nav{background:var(--glass);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 20px}
        .nav-inner{max-width:800px;margin:0 auto;display:flex;gap:8px;overflow-x:auto}
        .nav-btn{background:rgba(15,25,45,0.8);border:1px solid var(--border);color:var(--muted);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;white-space:nowrap;transition:all 0.2s}
        .nav-btn:hover{color:var(--text);border-color:var(--cyan)}
        .nav-btn.active{background:rgba(0,212,255,0.15);color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,0.2)}
        main{flex:1;padding:24px 20px;max-width:800px;margin:0 auto;width:100%}
        .page{display:none;animation:fadeIn 0.3s}
        .page.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
        .card h3{color:var(--cyan);font-size:16px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .row:last-child{border-bottom:none}
        .label{color:var(--muted);font-size:13px}
        .value{color:var(--text);font-size:14px;font-weight:500}
        .status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
        .status.online{background:#00ff88;box-shadow:0 0 6px #00ff88}
        .status.offline{background:#ff5050}
        .input-group{margin-bottom:16px}
        .input-group label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px;text-transform:uppercase}
        input,select{width:100%;background:rgba(10,18,30,0.8);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:14px;transition:border-color 0.2s}
        input:focus,select:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,0.2)}
        .btn{background:linear-gradient(135deg,var(--cyan),#0099cc);color:#000;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;width:100%;transition:transform 0.2s,box-shadow 0.2s}
        .btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,212,255,0.4)}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
        .stat{background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
        .stat-value{font-size:28px;font-weight:700;color:var(--cyan)}
        .stat-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase}
        .footer{text-align:center;padding:16px;color:var(--muted);font-size:11px;border-top:1px solid var(--border)}
    </style>
</head>
<body>
    <nav id="nav">
        <div class="nav-inner">
            <button class="nav-btn active" data-page="home">Home</button>
            <button class="nav-btn" data-page="radio">Radio</button>
            <button class="nav-btn" data-page="settings">Settings</button>
        </div>
    </nav>
    <main>
        <div id="home" class="page active">
            <div class="card">
                <h3>System Status</h3>
                <div class="row"><span class="label">ESP32 Status</span><span><span class="status online"></span>Online</span></div>
                <div class="row"><span class="label">Uptime</span><span class="value" id="uptime">00:00:00</span></div>
                <div class="row"><span class="label">Free Memory</span><span class="value" id="memory">-- KB</span></div>
                <div class="row"><span class="label">WiFi RSSI</span><span class="value" id="rssi">-- dBm</span></div>
            </div>
            <div class="grid">
                <div class="stat"><div class="stat-value" id="freq">7.074</div><div class="stat-label">Freq (MHz)</div></div>
                <div class="stat"><div class="stat-value" id="swr">1.2</div><div class="stat-label">SWR</div></div>
                <div class="stat"><div class="stat-value" id="temp">25.3</div><div class="stat-label">Temp (C)</div></div>
            </div>
        </div>
        <div id="radio" class="page">
            <div class="card"><h3>Transceiver</h3>
                <div class="row"><span class="label">Mode</span><span class="value">USB</span></div>
                <div class="row"><span class="label">Frequency</span><span class="value">14.225 MHz</span></div>
                <div class="row"><span class="label">Power</span><span class="value">10 W</span></div>
                <div class="row"><span class="label">S-Meter</span><span class="value">S7</span></div>
            </div>
            <div class="card"><h3>Band Selection</h3>
                <div class="grid">
                    <button class="btn" style="background:rgba(20,35,55,0.8);color:var(--text)">160m</button>
                    <button class="btn" style="background:rgba(20,35,55,0.8);color:var(--text)">80m</button>
                    <button class="btn" style="background:rgba(20,35,55,0.8);color:var(--text)">40m</button>
                    <button class="btn" style="background:rgba(20,35,55,0.8);color:var(--text)">20m</button>
                    <button class="btn" style="background:rgba(20,35,55,0.8);color:var(--text)">15m</button>
                    <button class="btn" style="background:rgba(20,35,55,0.8);color:var(--text)">10m</button>
                </div>
            </div>
        </div>
        <div id="settings" class="page">
            <div class="card"><h3>WiFi Configuration</h3>
                <div class="input-group"><label>SSID</label><input type="text" value="ESP32-HAM"></div>
                <div class="input-group"><label>Password</label><input type="password" value="1234567890"></div>
                <button class="btn">Save WiFi Settings</button>
            </div>
            <div class="card"><h3>Station Info</h3>
                <div class="input-group"><label>Callsign</label><input type="text" value="SP3KON"></div>
                <div class="input-group"><label>Locator</label><input type="text" value="JO92"></div>
                <button class="btn">Save Station Info</button>
            </div>
            <div class="card"><h3>About</h3>
                <div class="row"><span class="label">Version</span><span class="value">v1.4a</span></div>
                <div class="row"><span class="label">Build</span><span class="value">2026-06-14</span></div>
            </div>
        </div>
    </main>
    <div class="footer">ESP32-HAM-CLOCK by SP3KON</div>
    <script>
        !function(){"use strict";
        console.log("[ESP32] Init...");
        var nav=document.getElementById("nav");
        nav.addEventListener("click",function(e){
            var btn=e.target.closest(".nav-btn");
            if(btn){
                var p=btn.getAttribute("data-page");
                console.log("[Nav] "+p);
                document.querySelectorAll(".page").forEach(function(x){x.classList.remove("active")});
                document.getElementById(p).classList.add("active");
                document.querySelectorAll(".nav-btn").forEach(function(b){b.classList.remove("active")});
                btn.classList.add("active");
            }
        });
        function tick(){
            var d=new Date(),t=[d.getHours(),d.getMinutes(),d.getSeconds()].map(function(x){return String(x).padStart(2,"0")}).join(":");
            document.getElementById("uptime").textContent=t;
        }
        setInterval(tick,1000);tick();
        console.log("[ESP32] Ready!");
        }();
    </script>
</body>
</html>
